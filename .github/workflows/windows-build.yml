name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Build Windows application
        run: pyinstaller --noconfirm --clean spring_pet.spec

      - name: Package application
        shell: pwsh
        run: Compress-Archive -Path dist\Spring -DestinationPath Spring-Windows-x64.zip -CompressionLevel Optimal

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Spring-Windows-x64
          path: Spring-Windows-x64.zip
          archive: false
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$env:GITHUB_REF_NAME"
          "Spring-Windows-x64.zip#Spring Spirit for Windows x64"
          --verify-tag
          --generate-notes
          --title "Spring Spirit $env:GITHUB_REF_NAME"
